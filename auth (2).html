<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PageMood — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0602;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Lato',sans-serif;color:#f0e6cc;}
.card{background:#1a0f06;border:1px solid rgba(201,150,58,0.35);border-radius:12px;padding:42px 38px;width:100%;max-width:400px;margin:20px;}
.logo{font-family:'Cinzel',serif;font-size:2rem;color:#e8c060;letter-spacing:4px;text-align:center;margin-bottom:6px;}
.tagline{font-family:'IM Fell English',serif;font-style:italic;font-size:0.82rem;color:#c9963a;text-align:center;opacity:0.6;margin-bottom:30px;}
.tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(201,150,58,0.25);border-radius:6px;margin-bottom:26px;cursor:pointer;}
.tab{padding:11px;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:1.5px;border:none;background:none;color:#9a7040;cursor:pointer;text-align:center;}
.tab.on{background:rgba(201,150,58,0.15);color:#e8c060;}
label{display:block;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:1px;color:#9a7040;text-transform:uppercase;margin-bottom:6px;margin-top:14px;}
input{width:100%;padding:11px 14px;border:1px solid rgba(201,150,58,0.22);border-radius:5px;background:rgba(255,255,255,0.05);color:#f0e6cc;font-size:0.9rem;outline:none;font-family:'Lato',sans-serif;}
input:focus{border-color:#c9963a;}
input::placeholder{color:rgba(154,112,64,0.4);}
.btn{width:100%;margin-top:20px;padding:13px;border:none;border-radius:5px;background:linear-gradient(135deg,#e8c060,#c9963a);color:#1a0a02;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;cursor:pointer;font-weight:600;}
.btn:hover{opacity:0.9;}
.msg{min-height:20px;text-align:center;font-family:'IM Fell English',serif;font-style:italic;font-size:0.82rem;margin-top:14px;}
.err{color:#e87070;}.ok{color:#70e8a0;}
.guest{width:100%;margin-top:12px;padding:11px;border:1px solid rgba(201,150,58,0.18);border-radius:5px;background:none;color:rgba(201,150,58,0.5);font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:1.5px;cursor:pointer;}
.guest:hover{color:#c9963a;border-color:rgba(201,150,58,0.35);}
.divider{text-align:center;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:1px;color:rgba(201,150,58,0.3);margin:16px 0 4px;}
.forgot{text-align:right;font-family:'IM Fell English',serif;font-style:italic;font-size:0.72rem;color:#c9963a;opacity:0.55;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">PageMood</div>
  <div class="tagline">✦ your enchanted library awaits ✦</div>

  <div class="tabs">
    <button class="tab on" id="t-in" onclick="show('in')">Sign In</button>
    <button class="tab" id="t-up" onclick="show('up')">Create Account</button>
  </div>

  <!-- SIGN IN -->
  <div id="f-in">
    <label>Email</label>
    <input type="email" id="in-e" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="in-p" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignIn()">
    <div class="forgot" onclick="doForgot()">Forgot password?</div>
    <button class="btn" onclick="doSignIn()">✦ Enter My Library</button>
  </div>

  <!-- CREATE ACCOUNT -->
  <div id="f-up" style="display:none">
    <label>Email</label>
    <input type="email" id="up-e" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="up-p" placeholder="At least 6 characters">
    <label>Confirm Password</label>
    <input type="password" id="up-p2" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignUp()">
    <button class="btn" onclick="doSignUp()">✦ Create My Library</button>
  </div>

  <div class="msg" id="msg"></div>
  <div class="divider">or</div>
  <button class="guest" onclick="location.href='index.html'">Continue as Guest 🌙</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  'https://gcrwxjsxshkqfepuemzs.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdjcnd4anN4c2hrcWZlcHVlbXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4NTgsImV4cCI6MjA4OTU2Njg1OH0.RPm2oVlNvSjC4ICw1yQNki6_RW4T3FQZHrQP-Eg6jDM'
);

// Already logged in? Go straight to app
sb.auth.getSession().then(({data:{session}})=>{ if(session) location.href='index.html'; });

function show(t){
  document.getElementById('f-in').style.display = t==='in'?'block':'none';
  document.getElementById('f-up').style.display = t==='up'?'block':'none';
  document.getElementById('t-in').className = 'tab'+(t==='in'?' on':'');
  document.getElementById('t-up').className = 'tab'+(t==='up'?' on':'');
  msg('','');
}

function msg(m,c){ const el=document.getElementById('msg'); el.textContent=m; el.className='msg '+c; }

async function doSignIn(){
  const e=document.getElementById('in-e').value.trim();
  const p=document.getElementById('in-p').value;
  if(!e||!p){ msg('Please fill in both fields 🌙','err'); return; }
  msg('Signing in...','');
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){ msg('Wrong email or password 🌙','err'); }
  else { msg('Welcome back! ✨','ok'); setTimeout(()=>location.href='index.html',1000); }
}

async function doSignUp(){
  const e=document.getElementById('up-e').value.trim();
  const p=document.getElementById('up-p').value;
  const p2=document.getElementById('up-p2').value;
  if(!e||!p){ msg('Please fill in all fields 🌙','err'); return; }
  if(p!==p2){ msg('Passwords do not match 🌙','err'); return; }
  if(p.length<6){ msg('Password needs at least 6 characters','err'); return; }
  msg('Creating your library...','');
  const{data,error}=await sb.auth.signUp({email:e,password:p,options:{emailRedirectTo:'https://veethings.github.io/Pagemood/index.html'}});
  if(error){ msg(error.message,'err'); }
  else if(data.user&&data.user.identities&&data.user.identities.length===0){ msg('Email already registered — try signing in 🌙','err'); }
  else { msg('Account created! Check your email to confirm ✨','ok'); }
}

async function doForgot(){
  const e=document.getElementById('in-e').value.trim();
  if(!e){ msg('Enter your email above first 🌙','err'); return; }
  const{error}=await sb.auth.resetPasswordForEmail(e,{redirectTo:'https://veethings.github.io/Pagemood/index.html'});
  if(error){ msg(error.message,'err'); }
  else { msg('Reset link sent to your email ✨','ok'); }
}
</script>
</body>
</html>
